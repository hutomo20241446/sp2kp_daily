name: SP2KP Daily ETL

on:
  schedule:
    # Jadwal cron dalam UTC (WIB = UTC+7)
    # 16 WIB = 09:00 UTC
    # 18 WIB = 11:00 UTC
    # 20 WIB = 13:00 UTC
    # 22 WIB = 15:00 UTC
    # 24 WIB = 17:00 UTC
    - cron: "00 09 * * *"
    - cron: "00 11 * * *"
    - cron: "00 13 * * *"
    - cron: "00 15 * * *"
    - cron: "00 17 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Tanggal target (YYYY-MM-DD). Kosongkan untuk hari ini (WIB)."
        required: false
        default: ""

jobs:
  etl:
    name: Extract → Transform → Upsert
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # Supabase connection (diisi via GitHub Secrets)
      # DB_HOST: ${{ secrets.DB_HOST }}
      # DB_PORT: ${{ secrets.DB_PORT }}
      # DB_NAME: ${{ secrets.DB_NAME }}
      # DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # Scraper settings
      WORKERS: "5"
      PAGE_DELAY: "1.0"
      RETRY_MAX: "3"
      BASE_URL: "https://sp2kp.kemendag.go.id"
      PROVINSI: "Jawa Tengah"

      # Target date (manual override via workflow_dispatch)
      TARGET_DATE: ${{ github.event.inputs.target_date }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Debug DB connection (HAPUS SETELAH FIX)
        run: |
          python3 -c "
          import os, psycopg
          host = os.getenv('DB_HOST', 'TIDAK ADA')
          user = os.getenv('DB_USER', 'TIDAK ADA')
          port = os.getenv('DB_PORT', 'TIDAK ADA')
          print(f'DB_HOST : {host}')
          print(f'DB_USER : {user}')
          print(f'DB_PORT : {port}')
          print(f'DB_NAME : {os.getenv(\"DB_NAME\", \"TIDAK ADA\")}')
          dsn = f'host={host} port={port} dbname={os.getenv(\"DB_NAME\")} user={user} password={os.getenv(\"DB_PASSWORD\")} sslmode=require'
          print(f'Mencoba koneksi...')
          try:
              with psycopg.connect(dsn, connect_timeout=15) as conn:
                  v = conn.execute('SELECT current_user, version()').fetchone()
                  print(f'BERHASIL — user: {v[0]}')
          except Exception as e:
              print(f'GAGAL: {e}')
          "

      - name: Run ETL pipeline
        run: python -m src.main
